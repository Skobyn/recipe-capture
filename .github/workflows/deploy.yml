name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: apex-internal-apps
  SERVICE: recipe-capture
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/apex-internal-apps/workflow-assistant/recipe-capture

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE:$GITHUB_SHA -t $IMAGE:latest .

      - name: Push Docker image
        run: |
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE:$GITHUB_SHA \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "NODE_ENV=production,ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --quiet

      - name: Get service URL
        run: |
          URL=$(gcloud run services describe $SERVICE --platform managed --region $REGION --format 'value(status.url)')
          echo "✅ Deployed: $URL"
